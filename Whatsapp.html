<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Export Simulator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        /* --- Base Variables (Light Theme) --- */
        :root {
            --bg-body: #dadbd3;
            --bg-chat: #efeae2;
            --bg-header: #f0f2f5;
            --bubble-received: #ffffff;
            --bubble-sent: #d9fdd3;
            --bubble-system: #ffeebc;
            --text-main: #111b21;
            --text-meta: #667781;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- Upload Screen --- */
        .upload-screen {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .upload-screen p {
            color: var(--text-meta);
            font-size: 0.9rem;
        }

        input[type="file"] {
            margin-top: 10px;
            padding: 10px;
            border: 1px dashed #ccc;
            border-radius: 6px;
            cursor: pointer;
        }

        /* --- Main Chat Container --- */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 95vh;
            background-color: var(--bg-chat);
            display: none; 
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- Header & Footer --- */
        .chat-header, .chat-footer {
            background-color: var(--bg-header);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ccc;
            margin-right: 15px;
        }

        .contact-info {
            flex-grow: 1;
        }

        .contact-info h2 {
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        /* --- Dropdown Styling --- */
        .me-selector-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .me-selector-container label {
            font-size: 0.75rem;
            color: var(--text-meta);
        }

        #me-selector {
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background-color: white;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            max-width: 150px;
        }

        .fake-input {
            width: 100%;
            background-color: #ffffff;
            padding: 10px 15px;
            border-radius: 8px;
            color: var(--text-meta);
        }

        /* --- Scrollable Message Area --- */
        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* --- Message Rows --- */
        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.sent {
            justify-content: flex-end;
        }

        .message-row.received {
            justify-content: flex-start;
        }

        .message-row.system {
            justify-content: center;
            margin: 10px 0;
        }

        /* --- Message Bubbles --- */
        .bubble {
            max-width: 65%;
            padding: 6px 10px;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        .sent .bubble {
            background-color: var(--bubble-sent);
            border-top-right-radius: 0;
        }

        .received .bubble {
            background-color: var(--bubble-received);
            border-top-left-radius: 0;
        }

        .system-bubble {
            background-color: var(--bubble-system);
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 12px;
            color: var(--text-meta);
            box-shadow: none;
            text-align: center;
        }

        /* --- Inner Bubble Elements --- */
        .sender-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #029d00;
            margin-bottom: 2px;
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.3;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-meta {
            font-size: 0.7rem;
            color: var(--text-meta);
            align-self: flex-end;
            margin-top: 4px;
            margin-left: 15px;
        }

        /* --- Media Styling --- */
        .message-media {
            display: flex;
            flex-direction: column;
            margin-bottom: 5px;
        }

        .message-media img, .message-media video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 6px;
            background-color: #e0e0e0; 
            object-fit: contain;
        }

        .message-media audio {
            width: 250px;
            height: 40px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="upload-screen" class="upload-screen">
        <h2>WhatsApp Simulator</h2>
        <p>Select your exported WhatsApp .zip file. Everything stays securely on your device.</p>
        <input type="file" id="zip-upload" accept=".zip">
    </div>

    <div class="chat-container">
        <header class="chat-header">
            <div class="avatar"></div>
            <div class="contact-info">
                <h2 id="chat-title">Exported Chat</h2>
                <div class="me-selector-container">
                    <label for="me-selector">View as:</label>
                    <select id="me-selector">
                        <option value="">Loading...</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="chat-messages" id="chat-messages"></main>

        <footer class="chat-footer">
            <div class="fake-input">Read-only mode...</div>
        </footer>
    </div>

    <script>
        let globalMessages = [];
        let globalMediaMap = {};

        // --- 1. THE PARSER (Updated for Android & Universal formats) ---
        function parseChat(rawText, mediaMap) {
            globalMediaMap = mediaMap; 
            
            // This robust regex handles both iOS standard spaces and Android narrow no-break spaces (\u202F)
            const messageRegex = /(?:^|\n)(\[?\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}[, ]+\d{1,2}:\d{2}(?::\d{2})?[\s\u202F]*(?:[APap][Mm])?\]?[ \-]+)/g;
            const parts = rawText.split(messageRegex).filter(part => part.trim() !== '');

            const messages = [];
            const senders = new Set();

            for (let i = 0; i < parts.length; i += 2) {
                const metaPart = parts[i] ? parts[i].trim() : "";
                const contentPart = parts[i + 1] ? parts[i + 1].trim() : "";

                if (!metaPart || !contentPart) continue;

                const colonIndex = contentPart.indexOf(':');
                let sender = "System";
                let text = contentPart;

                // Increased to 80 to catch longer names like "Satya Ranjan Behera IGNOU Jagatsinghpur"
                if (colonIndex !== -1 && colonIndex < 80) {
                    sender = contentPart.substring(0, colonIndex).trim();
                    text = contentPart.substring(colonIndex + 1).trim();
                    senders.add(sender);
                } else {
                    sender = "System"; 
                }

                let attachedMedia = null;
                const iosMediaMatch = text.match(/<attached: ([^>]+)>/);
                const androidMediaMatch = text.match(/([^\n]+) \(file attached\)/);

                if (iosMediaMatch) {
                    attachedMedia = iosMediaMatch[1].trim();
                    text = text.replace(iosMediaMatch[0], '').trim();
                } else if (androidMediaMatch) {
                    attachedMedia = androidMediaMatch[1].trim();
                    text = text.replace(androidMediaMatch[0], '').trim();
                }

                messages.push({ timestamp: metaPart, sender: sender, text: text, media: attachedMedia });
            }

            globalMessages = messages; 

            // --- POPULATE THE DROPDOWN ---
            const senderArray = Array.from(senders).filter(s => s !== "System");
            const meSelector = document.getElementById('me-selector');
            meSelector.innerHTML = ''; 
            
            senderArray.forEach(sender => {
                const option = document.createElement('option');
                option.value = sender;
                option.textContent = sender;
                meSelector.appendChild(option);
            });

            document.getElementById('chat-title').innerText = senderArray.length > 2 ? 'Group Chat' : senderArray.join(' & ');

            let initialMe = senderArray.length > 1 ? senderArray[1] : senderArray[0];
            if (initialMe) {
                meSelector.value = initialMe;
            }

            renderMessages(globalMessages, meSelector.value, globalMediaMap);
        }

        // --- LISTEN FOR DROPDOWN CHANGES ---
        document.getElementById('me-selector').addEventListener('change', function(e) {
            renderMessages(globalMessages, e.target.value, globalMediaMap);
        });

        // --- 2. THE RENDERER (Updated for Android formats) ---
        function renderMessages(messages, myName, mediaMap) {
            const chatContainer = document.getElementById('chat-messages');
            chatContainer.innerHTML = ''; 

            let lastDate = "";

            messages.forEach(msg => {
                // Updated to reliably catch dates
                const dateMatch = msg.timestamp.match(/\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}/);
                const msgDate = dateMatch ? dateMatch[0] : "";

                if (msgDate && msgDate !== lastDate) {
                    chatContainer.innerHTML += `<div class="message-row system"><div class="bubble system-bubble">${msgDate}</div></div>`;
                    lastDate = msgDate;
                }

                if (msg.sender === "System") {
                    chatContainer.innerHTML += `<div class="message-row system"><div class="bubble system-bubble">${msg.text}</div></div>`;
                    return;
                }

                const alignmentClass = msg.sender === myName ? 'sent' : 'received';
                const showName = alignmentClass === 'received' ? `<div class="sender-name">${msg.sender}</div>` : '';

                let mediaHTML = '';
                if (msg.media && mediaMap[msg.media]) {
                    const url = mediaMap[msg.media];
                    if (msg.media.match(/\.(mp4)$/i)) {
                        mediaHTML = `<div class="message-media"><video src="${url}" controls preload="metadata"></video></div>`;
                    } else if (msg.media.match(/\.(opus|mp3|wav|ogg|m4a)$/i)) {
                        mediaHTML = `<div class="message-media"><audio src="${url}" controls></audio></div>`;
                    } else {
                        mediaHTML = `<div class="message-media"><img src="${url}" alt="Attached Media" loading="lazy"></div>`;
                    }
                } else if (msg.media) {
                    mediaHTML = `<div class="message-media"><div style="padding: 10px; background: rgba(0,0,0,0.05); border-radius: 5px; font-size: 0.8rem; border: 1px dashed #999;">Media missing: ${msg.media}</div></div>`;
                }

                // Updated to catch times with the narrow space
                const timeMatch = msg.timestamp.match(/\d{1,2}:\d{2}(?::\d{2})?[\s\u202F]*(?:[APap][Mm])?/);
                const timeStr = timeMatch ? timeMatch[0] : "";

                const messageDiv = document.createElement('div');
                messageDiv.className = `message-row ${alignmentClass}`;
                messageDiv.innerHTML = `
                    <div class="bubble">
                        ${showName}
                        ${mediaHTML}
                        ${msg.text ? `<div class="message-text">${msg.text}</div>` : ''}
                        <div class="message-meta">${timeStr}</div>
                    </div>`;
                
                chatContainer.appendChild(messageDiv);
            });

            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 50);
        }

        // --- 3. THE UPLOAD HANDLER ---
        document.getElementById('zip-upload').addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const uploadScreen = document.getElementById('upload-screen');
            uploadScreen.innerHTML = "<h3>Unzipping and processing...</h3><p>This might take a few seconds for large chats.</p>";

            const zip = new JSZip();
            
            try {
                const loadedZip = await zip.loadAsync(file);
                let rawChatText = "";
                let mediaMap = {};

                const filePromises = [];
                
                loadedZip.forEach((relativePath, zipEntry) => {
                    if (relativePath.endsWith('.txt')) {
                        filePromises.push(
                            zipEntry.async('text').then(content => {
                                rawChatText = content;
                            })
                        );
                    } 
                    else if (relativePath.match(/\.(jpg|jpeg|png|mp4|opus|mp3|wav|ogg|m4a)$/i)) {
                        filePromises.push(
                            zipEntry.async('blob').then(blob => {
                                const blobUrl = URL.createObjectURL(blob);
                                const filename = relativePath.split('/').pop(); 
                                mediaMap[filename] = blobUrl;
                            })
                        );
                    }
                });

                await Promise.all(filePromises);
                
                if (!rawChatText) {
                    throw new Error("Could not find a .txt chat file inside the ZIP.");
                }

                uploadScreen.style.display = 'none';
                document.querySelector('.chat-container').style.display = 'flex';

                parseChat(rawChatText, mediaMap); 

            } catch (err) {
                console.error("Error reading zip:", err);
                alert("Failed to read the zip file. Ensure it is a valid WhatsApp export. Error: " + err.message);
                location.reload(); 
            }
        });
    </script>
</body>
</html>
